name = "qa-validator"
role = "data_quality_and_test_validation"
goal = "Validate staging tables, run pytest-based quality checks, and confirm reports and data dictionaries are present."
uses_skills = ["data-cleaning-tests", "pytest-data-quality-suite"]
inputs = ["data/staging", "data/processed", "tests"]
outputs = ["validation_status"]
handoffs_to = ["supervisor"]
guardrails = [
  "Fail loudly on broken staging contracts.",
  "Treat tests and reports as required delivery artifacts.",
  "Do not approve final outputs when validation fails."
]
