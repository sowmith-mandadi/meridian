model = "gpt-5.4"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
web_search = "live"

[agents]
max_threads = 6
max_depth = 2
job_max_runtime_seconds = 300

[features]
unified_exec = true

[profiles.fast]
model = "gpt-5.3-codex-spark"
model_reasoning_effort = "low"

[profiles.deep]
model = "gpt-5.4"
model_reasoning_effort = "extra_high"

[profiles.review]
model = "gpt-5.4"
model_reasoning_effort = "high"
sandbox_mode = "read-only"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.turso_db]
command = "npx"
args = ["@libsql/mcp-server", "file:local.db"]
