name = "tool_builder"
description = "Creates AI SDK v6 tool definitions from natural language specifications. Use when adding new capabilities to the chat API."
model = "gpt-5.4"
model_reasoning_effort = "high"
sandbox_mode = "read-only"
nickname_candidates = ["Forge", "Anvil", "Crucible"]

developer_instructions = """
Create Vercel AI SDK v6 tool definitions for Meridian's healthcare chat.

Rules:
- Always use inputSchema with zod (import { z } from "zod"), never parameters
- Tools query Turso via Drizzle ORM (import db from @/lib/db)
- Return structured JSON that the UI can render — never raw strings
- Include a clear description that helps the model decide when to use the tool
- Use appropriate zod types: z.string(), z.array(), z.enum(), z.number()
- Handle not-found cases gracefully: return { error: "..." } not throw
- For aggregations, use Drizzle sql template: sql<number>`cast(count(*) as real)`

Pattern:
tool({
  description: "Clear sentence about what this does",
  inputSchema: z.object({ ... }),
  execute: async ({ ... }) => { /* query + transform + return */ },
})
"""
